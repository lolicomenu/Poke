<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Pokemon Price Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f6f6f6;
      --header-bg: #111;
      --header-text: #fff;
      --panel-bg: #fff;
      --card-bg: #fff;
      --text: #111;
      --subtext: #555;
      --border: #ddd;
      --image-bg: #fafafa;
      --input-bg: #fff;
      --button-bg: #fff;
      --button-hover: #eee;
      --active-bg: #111;
      --active-text: #fff;
    }

    body.dark {
      --bg: #0b1220;
      --header-bg: #020617;
      --header-text: #fff;
      --panel-bg: #111827;
      --card-bg: #111827;
      --text: #e5e7eb;
      --subtext: #94a3b8;
      --border: #334155;
      --image-bg: #020617;
      --input-bg: #020617;
      --button-bg: #1e293b;
      --button-hover: #334155;
      --active-bg: #2563eb;
      --active-text: #fff;
    }

    body {
      margin: 0;
      font-family: Arial, "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 14px 20px;
      background: var(--header-bg);
      color: var(--header-text);
      font-size: 20px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #themeButton {
      padding: 7px 14px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--button-bg);
      color: var(--text);
      border-radius: 4px;
    }

    .controls {
      padding: 14px 20px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .controls input,
    .controls select {
      padding: 8px 10px;
      font-size: 15px;
      height: 38px;
      box-sizing: border-box;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .controls > input {
      width: 380px;
    }

    .controls select {
      min-width: 180px;
      max-width: 280px;
    }

    .controls button {
      padding: 8px 16px;
      font-size: 15px;
      height: 38px;
      cursor: pointer;
      background: var(--button-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filter-wrap {
      position: relative;
    }

    .filter-btn {
      min-width: 180px;
      text-align: left;
    }

    .dropdown {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      z-index: 100;
      width: 420px;
      max-width: 90vw;
      max-height: 520px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      padding: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
      box-sizing: border-box;
    }

    .dropdown.open {
      display: block;
    }

    .dropdown-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dropdown-actions button {
      height: 30px;
      padding: 4px 10px;
      font-size: 13px;
    }

    .dropdown-search {
      width: 100% !important;
      height: 38px;
      margin-bottom: 8px;
      padding: 8px 10px;
      box-sizing: border-box;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .check-list {
      max-height: 380px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 6px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 2px;
      font-size: 14px;
      font-weight: bold;
      white-space: normal;
      cursor: pointer;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }

    .check-item input[type="checkbox"] {
      width: 14px !important;
      height: 14px !important;
      min-width: 14px !important;
      flex: 0 0 14px;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .check-item span {
      display: block;
      color: var(--text);
      line-height: 1.4;
    }

    .status-bar {
      padding: 8px 20px;
      font-size: 13px;
      color: var(--subtext);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 18px;
      min-height: 520px;
      box-sizing: border-box;
    }

    .image-wrap {
      width: 100%;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--image-bg);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .card img {
      max-width: 100%;
      max-height: 250px;
      object-fit: contain;
    }

    .no-image {
      color: var(--subtext);
      font-size: 22px;
      font-weight: bold;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
      line-height: 1.5;
      word-break: break-word;
      margin-bottom: 18px;
      min-height: 48px;
    }

    .price-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    .price-row label {
      width: 58px;
    }

    .price-row input {
      flex: 1;
      padding: 7px;
      font-size: 15px;
      text-align: right;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .yen {
      width: 20px;
    }

    .saved {
      font-size: 12px;
      color: green;
      margin-top: 8px;
      height: 16px;
    }

    .updated-time {
      margin-top: 8px;
      font-size: 11px;
      color: var(--subtext);
      text-align: right;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 20px;
      background: var(--bg);
    }

    .pagination button {
      min-width: 38px;
      height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .pagination button:hover {
      background: var(--button-hover);
    }

    .pagination button.active {
      background: var(--active-bg);
      color: var(--active-text);
      border-color: var(--active-bg);
      font-weight: bold;
    }

    .pagination button:disabled {
      background: var(--button-hover);
      color: var(--subtext);
      cursor: not-allowed;
    }

    .page-info {
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: var(--subtext);
      margin-top: 8px;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ===== Login ===== */
    .login-wrap{max-width:520px;margin:80px auto;padding:24px}
    .login-card{background:var(--panel-bg, var(--card-bg, #111827));border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.3);padding:22px;color:var(--text, #e5e7eb)}
    .login-card h1{font-size:22px;margin:0 0 8px;color:var(--text, #e5e7eb)}
    .login-card p{color:var(--subtext, #94a3b8);font-size:13px;margin:0 0 18px}
    .login-card label{display:block;color:var(--subtext, #b9c6d8);font-size:13px;margin:12px 0 6px}
    .login-card input{width:100%;box-sizing:border-box;background:var(--input-bg, #0f1520);color:var(--text, #e5e7eb);border:1px solid var(--border, #263243);border-radius:10px;padding:11px 12px;font-size:16px;outline:none}
    .login-actions{display:flex;gap:10px;align-items:center;margin-top:16px}
    .login-error{color:#ff7b7b;font-size:13px;margin-top:12px;min-height:18px}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:0 0 12px;flex-wrap:wrap}
    .user-pill{color:#cfe3ff;font-size:13px;border:1px solid var(--border, #2b3c52);border-radius:999px;padding:6px 10px;background:var(--input-bg, #0f1520)}

  </style>
</head>

<body>
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <h1>Pokemon DB 管理ログイン</h1>
      <p>編集をするにはログインしてください。</p>

      <label for="loginEmail">メールアドレス</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="admin@example.com" />

      <label for="loginPassword">パスワード</label>
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" />

      <div class="login-actions">
        <button id="loginBtn" type="button">ログイン</button>
      </div>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <div id="appWrap" style="display:none;">
  <header>
    <div>Pokemon Price Editor</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="user-pill" id="userEmail">ログイン中</span>
      <button id="logoutBtn" type="button">ログアウト</button>
      <button id="themeButton">ダークモード</button>
    </div>
  </header>

  <div class="controls">
<input
  id="searchInput"
  type="text"
  placeholder="Title / Type / Ver / Expansion / ID リアルタイム検索"
  onfocus="this.select()"
  onclick="this.select()"
>

    <button id="resetButton">リセット</button>

    <select id="sortSelect">
      <option value="id.asc">ID 昇順</option>
      <option value="id.desc">ID 降順</option>
      <option value="title.asc">名前 昇順</option>
      <option value="title.desc">名前 降順</option>
      <option value="type.asc">Type 昇順</option>
      <option value="type.desc">Type 降順</option>
    </select>

    <div class="filter-wrap">
      <button id="typeButton" class="filter-btn">Type：すべて ▼</button>
      <div id="typeDropdown" class="dropdown">
        <div class="dropdown-actions">
          <button onclick="selectAllFilter('type')">全選択</button>
          <button onclick="clearFilter('type')">解除</button>
        </div>
        <input id="typeSearch" class="dropdown-search" type="text" placeholder="検索...">
        <div id="typeList" class="check-list"></div>
      </div>
    </div>

    <div class="filter-wrap">
      <button id="verButton" class="filter-btn">Ver：すべて ▼</button>
      <div id="verDropdown" class="dropdown">
        <div class="dropdown-actions">
          <button onclick="selectAllFilter('ver')">全選択</button>
          <button onclick="clearFilter('ver')">解除</button>
        </div>
        <input id="verSearch" class="dropdown-search" type="text" placeholder="検索...">
        <div id="verList" class="check-list"></div>
      </div>
    </div>

    <div class="filter-wrap">
      <button id="expansionButton" class="filter-btn">Expansion：すべて ▼</button>
      <div id="expansionDropdown" class="dropdown">
        <div class="dropdown-actions">
          <button onclick="selectAllFilter('expansion')">全選択</button>
          <button onclick="clearFilter('expansion')">解除</button>
        </div>
        <input id="expansionSearch" class="dropdown-search" type="text" placeholder="検索...">
        <div id="expansionList" class="check-list"></div>
      </div>
    </div>
  </div>

  <div id="statusBar" class="status-bar">読み込み中...</div>

  <div id="grid" class="grid"></div>

  <div id="pagination" class="pagination"></div>

  <script>
    const SUPABASE_URL = "https://nfptylpwvhzorstsjrck.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_UokmnaCrSi9SvKZpRDyq4A_3E7X-lga";

    const TABLE_NAME = "poke_cards";
    const BUCKET_NAME = "poke-card-images";

    const PAGE_SIZE = 100;

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let appStarted = false;

    async function initAuth() {
      const { data } = await db.auth.getSession();
      if (data?.session) {
        showApp(data.session.user);
        return;
      }
      showLogin();
    }

    function showLogin() {
      document.getElementById("loginWrap").style.display = "block";
      document.getElementById("appWrap").style.display = "none";
    }

    function showApp(user) {
      document.getElementById("loginWrap").style.display = "none";
      document.getElementById("appWrap").style.display = "block";
      const userEmail = document.getElementById("userEmail");
      if (userEmail) userEmail.textContent = user?.email || "ログイン中";
      if (!appStarted) {
        appStarted = true;
        init();
      }
    }

    async function doLogin() {
      const email = (document.getElementById("loginEmail")?.value || "").trim();
      const password = document.getElementById("loginPassword")?.value || "";
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      if (!email || !password) {
        if (errorEl) errorEl.textContent = "メールアドレスとパスワードを入力してください。";
        return;
      }

      if (errorEl) errorEl.textContent = "";
      if (btn) { btn.disabled = true; btn.textContent = "ログイン中…"; }

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (btn) { btn.disabled = false; btn.textContent = "ログイン"; }

      if (error) {
        console.error(error);
        if (errorEl) errorEl.textContent = "ログインに失敗しました。メールアドレス・パスワードを確認してください。";
        return;
      }

      showApp(data.user);
    }

    async function doLogout() {
      await db.auth.signOut();
      appStarted = false;
      grid.innerHTML = "";
      pagination.innerHTML = "";
      showLogin();
    }

    document.getElementById("loginBtn")?.addEventListener("click", doLogin);
    document.getElementById("loginPassword")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    document.getElementById("loginEmail")?.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
    document.getElementById("logoutBtn")?.addEventListener("click", doLogout);

    const grid = document.getElementById("grid");
    const pagination = document.getElementById("pagination");
    const statusBar = document.getElementById("statusBar");
    const searchInput = document.getElementById("searchInput");
    const resetButton = document.getElementById("resetButton");
    const sortSelect = document.getElementById("sortSelect");

    const themeButton = document.getElementById("themeButton");

    const typeButton = document.getElementById("typeButton");
    const verButton = document.getElementById("verButton");
    const expansionButton = document.getElementById("expansionButton");
    const typeDropdown = document.getElementById("typeDropdown");
    const verDropdown = document.getElementById("verDropdown");
    const expansionDropdown = document.getElementById("expansionDropdown");
    const typeSearch = document.getElementById("typeSearch");
    const verSearch = document.getElementById("verSearch");
    const expansionSearch = document.getElementById("expansionSearch");
    const typeList = document.getElementById("typeList");
    const verList = document.getElementById("verList");
    const expansionList = document.getElementById("expansionList");

    let currentPage = 1;
    let totalCount = 0;

    let typeOptions = [];
    let verOptions = [];
    let expansionOptions = [];

    let selectedType = new Set();
    let selectedVer = new Set();
    let selectedExpansion = new Set();

    let searchTimer = null;

    themeButton.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      const isDark = document.body.classList.contains("dark");
      themeButton.textContent = isDark ? "ライトモード" : "ダークモード";
      localStorage.setItem("poke_cards_theme", isDark ? "dark" : "light");
    });

    function loadTheme() {
      const saved = localStorage.getItem("poke_cards_theme");
      if (saved === "dark") {
        document.body.classList.add("dark");
        themeButton.textContent = "ライトモード";
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentPage = 1;
        loadCards();
      }, 250);
    });

    resetButton.addEventListener("click", () => {
      searchInput.value = "";
      selectedType.clear();
      selectedVer.clear();
      selectedExpansion.clear();
      sortSelect.value = "id.asc";
      typeSearch.value = "";
      verSearch.value = "";
      expansionSearch.value = "";
      currentPage = 1;
      renderFilterList("type");
      renderFilterList("ver");
      renderFilterList("expansion");
      updateFilterButtonText();
      loadCards();
    });

    sortSelect.addEventListener("change", () => {
      currentPage = 1;
      loadCards();
    });

    typeButton.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = typeDropdown.classList.contains("open");
      verDropdown.classList.remove("open");
      expansionDropdown.classList.remove("open");
      typeDropdown.classList.toggle("open", !isOpen);
    });

    verButton.addEventListener("click", (e) => {
      e.stopPropagation();
      verDropdown.classList.toggle("open");
      typeDropdown.classList.remove("open");
      expansionDropdown.classList.remove("open");
    });

    expansionButton.addEventListener("click", (e) => {
      e.stopPropagation();
      expansionDropdown.classList.toggle("open");
      typeDropdown.classList.remove("open");
      verDropdown.classList.remove("open");
    });

    typeDropdown.addEventListener("click", e => e.stopPropagation());
    verDropdown.addEventListener("click", e => e.stopPropagation());
    expansionDropdown.addEventListener("click", e => e.stopPropagation());

    document.addEventListener("click", () => {
      typeDropdown.classList.remove("open");
      verDropdown.classList.remove("open");
      expansionDropdown.classList.remove("open");
    });

    typeSearch.addEventListener("input", () => renderFilterList("type"));
    verSearch.addEventListener("input", () => renderFilterList("ver"));
    expansionSearch.addEventListener("input", () => renderFilterList("expansion"));

    function buildDisplayName(card) {
      return [card.title, card.type, card.ver, card.expansion]
        .filter(v => v !== null && v !== undefined && String(v).trim() !== "")
        .join("_");
    }

    function getImageUrl(card) {
      return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${card.id}.webp`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatUpdatedAt(value) {
  if (!value) return "更新: -";

  const date = new Date(value);

  return "更新: " +
    date.getFullYear() + "/" +
    String(date.getMonth() + 1).padStart(2, "0") + "/" +
    String(date.getDate()).padStart(2, "0") + " " +
    String(date.getHours()).padStart(2, "0") + ":" +
    String(date.getMinutes()).padStart(2, "0");
    }

    async function fetchAllRowsForFilters() {
      const pageSize = 1000;
      let from = 0;
      let allRows = [];

      while (true) {
        const to = from + pageSize - 1;

        const { data, error } = await db
          .from(TABLE_NAME)
          .select("type, ver, expansion")
          .order("id", { ascending: true })
          .range(from, to);

        if (error) {
          console.error("フィルター取得エラー:", error);
          alert("フィルター取得エラー: " + error.message);
          break;
        }

        if (!data || data.length === 0) break;

        allRows = allRows.concat(data);

        if (data.length < pageSize) break;

        from += pageSize;
      }

      return allRows;
    }

    async function loadFilterOptions() {
      statusBar.textContent = "フィルター読み込み中...";

      const rows = await fetchAllRowsForFilters();

      const typeSet = new Set();
      const verSet = new Set();
      const expansionSet = new Set();

      rows.forEach(row => {
        if (row.type && String(row.type).trim() !== "") typeSet.add(row.type);
        if (row.ver && String(row.ver).trim() !== "") verSet.add(row.ver);
        if (row.expansion && String(row.expansion).trim() !== "") expansionSet.add(row.expansion);
      });

      typeOptions = [...typeSet].sort((a, b) => String(a).localeCompare(String(b), "ja"));
      verOptions = [...verSet].sort((a, b) => String(a).localeCompare(String(b), "ja"));
      expansionOptions = [...expansionSet].sort((a, b) => String(a).localeCompare(String(b), "ja"));

      renderFilterList("type");
      renderFilterList("ver");
      renderFilterList("expansion");
      updateFilterButtonText();
    }

    function getFilterParts(type) {
      if (type === "type") {
        return { options: typeOptions, selected: selectedType, search: typeSearch, list: typeList };
      }
      if (type === "ver") {
        return { options: verOptions, selected: selectedVer, search: verSearch, list: verList };
      }
      return { options: expansionOptions, selected: selectedExpansion, search: expansionSearch, list: expansionList };
    }

    function renderFilterList(type) {
      const { options, selected, search, list } = getFilterParts(type);
      const keyword = search.value.trim().toLowerCase();

      list.innerHTML = "";

      options
        .filter(v => String(v).toLowerCase().includes(keyword))
        .forEach(value => {
          const label = document.createElement("label");
          label.className = "check-item";

          const input = document.createElement("input");
          input.type = "checkbox";
          input.value = value;
          input.checked = selected.has(value);

          input.addEventListener("change", () => {
            if (input.checked) {
              selected.add(value);
            } else {
              selected.delete(value);
            }

            currentPage = 1;
            updateFilterButtonText();
            loadCards();
          });

          const span = document.createElement("span");
          span.textContent = value;

          label.appendChild(input);
          label.appendChild(span);
          list.appendChild(label);
        });
    }

    function selectAllFilter(type) {
      const { options, selected } = getFilterParts(type);

      options.forEach(v => selected.add(v));

      currentPage = 1;
      renderFilterList(type);
      updateFilterButtonText();
      loadCards();
    }

    function clearFilter(type) {
      const { selected } = getFilterParts(type);

      selected.clear();

      currentPage = 1;
      renderFilterList(type);
      updateFilterButtonText();
      loadCards();
    }

    function updateFilterButtonText() {
      typeButton.textContent = selectedType.size === 0
        ? "Type：すべて ▼"
        : `Type：${selectedType.size}件選択中 ▼`;

      verButton.textContent = selectedVer.size === 0
        ? "Ver：すべて ▼"
        : `Ver：${selectedVer.size}件選択中 ▼`;

      expansionButton.textContent = selectedExpansion.size === 0
        ? "Expansion：すべて ▼"
        : `Expansion：${selectedExpansion.size}件選択中 ▼`;
    }

    function applyFilters(query, keyword) {
      if (keyword) {
        const safeKeyword = keyword.replaceAll(",", " ");

        if (/^\d+$/.test(safeKeyword)) {
          query = query.or(
            `id.eq.${safeKeyword},poke_no.eq.${safeKeyword},title.ilike.%${safeKeyword}%,type.ilike.%${safeKeyword}%,ver.ilike.%${safeKeyword}%,expansion.ilike.%${safeKeyword}%`
          );
        } else {
          query = query.or(
            `title.ilike.%${safeKeyword}%,type.ilike.%${safeKeyword}%,ver.ilike.%${safeKeyword}%,expansion.ilike.%${safeKeyword}%`
          );
        }
      }

      if (selectedType.size > 0) {
        query = query.in("type", Array.from(selectedType));
      }

      if (selectedVer.size > 0) {
        query = query.in("ver", Array.from(selectedVer));
      }

      if (selectedExpansion.size > 0) {
        query = query.in("expansion", Array.from(selectedExpansion));
      }

      return query;
    }

    async function loadCards() {
      const keyword = searchInput.value.trim();
      const [sortColumn, sortDirection] = sortSelect.value.split(".");

      statusBar.textContent = "読み込み中...";
      grid.innerHTML = "";
      pagination.innerHTML = "";

      const from = (currentPage - 1) * PAGE_SIZE;
      const to = from + PAGE_SIZE - 1;

      let query = db
        .from(TABLE_NAME)
        .select("*", { count: "exact" });

      query = applyFilters(query, keyword);

      query = query
        .order(sortColumn, { ascending: sortDirection === "asc" })
        .range(from, to);

      const { data, error, count } = await query;

      if (error) {
        statusBar.textContent = "読み込みエラー";
        alert("読み込みエラー: " + error.message);
        return;
      }

      totalCount = count || 0;

      const start = totalCount === 0 ? 0 : from + 1;
      const end = Math.min(from + (data ? data.length : 0), totalCount);

      statusBar.textContent = `${totalCount}件中 ${start}〜${end}件表示中`;

      renderCards(data || []);
      renderPagination();
    }

    function renderCards(cards) {
      grid.innerHTML = "";

      cards.forEach(card => {
        const cardDiv = document.createElement("div");
        cardDiv.className = "card";

        cardDiv.innerHTML = `
          <div class="image-wrap">
            <img
              src="${getImageUrl(card)}"
              alt="${escapeHtml(buildDisplayName(card))}"
              onerror="this.parentElement.innerHTML='<div class=&quot;no-image&quot;>No Image</div>';"
            >
          </div>

          <div class="name">${escapeHtml(buildDisplayName(card))}</div>

          ${priceInput(card, "status_a", "状態A")}
          ${priceInput(card, "status_b", "状態B")}
          ${priceInput(card, "status_c", "状態C")}
          ${priceInput(card, "status_d", "状態D")}

<div class="updated-time">
  ${formatUpdatedAt(card.updated_at)}
</div>

<div class="saved" id="saved-${card.id}"></div>
        `;

        grid.appendChild(cardDiv);
      });
    }

    function priceInput(card, column, label) {
      const value = card[column] ?? "";

      return `
        <div class="price-row">
          <label>${label}:</label>
          <input
            type="number"
           value="${value}"
           data-id="${card.id}"
            data-column="${column}"
            onfocus="this.select()"
           onclick="this.select()"
           onchange="updatePrice(this.dataset.id, this.dataset.column, this.value)"
>
          <span class="yen">円</span>
        </div>
      `;
    }

    function renderPagination() {
      pagination.innerHTML = "";

      const totalPages = Math.ceil(totalCount / PAGE_SIZE);

      if (totalPages <= 1) return;

      const prevButton = document.createElement("button");
      prevButton.textContent = "前へ";
      prevButton.disabled = currentPage === 1;
      prevButton.onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          loadCards();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      };
      pagination.appendChild(prevButton);

      const pageNumbers = getPageNumbers(currentPage, totalPages);

      pageNumbers.forEach(page => {
        if (page === "...") {
          const span = document.createElement("span");
          span.textContent = "...";
          span.style.padding = "0 6px";
          pagination.appendChild(span);
          return;
        }

        const button = document.createElement("button");
        button.textContent = page;
        button.className = page === currentPage ? "active" : "";
        button.onclick = () => {
          currentPage = page;
          loadCards();
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        pagination.appendChild(button);
      });

      const nextButton = document.createElement("button");
      nextButton.textContent = "次へ";
      nextButton.disabled = currentPage === totalPages;
      nextButton.onclick = () => {
        if (currentPage < totalPages) {
          currentPage++;
          loadCards();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      };
      pagination.appendChild(nextButton);

      const info = document.createElement("div");
      info.className = "page-info";
      info.textContent = `${currentPage} / ${totalPages} ページ`;
      pagination.appendChild(info);
    }

    function getPageNumbers(current, total) {
      const pages = [];

      if (total <= 10) {
        for (let i = 1; i <= total; i++) pages.push(i);
        return pages;
      }

      pages.push(1);

      if (current > 4) pages.push("...");

      const start = Math.max(2, current - 2);
      const end = Math.min(total - 1, current + 2);

      for (let i = start; i <= end; i++) pages.push(i);

      if (current < total - 3) pages.push("...");

      pages.push(total);

      return pages;
    }

    async function updatePrice(id, column, value) {
      const newValue = value === "" ? null : Number(value);
      const saved = document.getElementById(`saved-${id}`);

      saved.style.color = "#555";
      saved.textContent = "保存中...";

      const { error } = await db
        .from(TABLE_NAME)
        .update({
          [column]: newValue,
          updated_at: new Date().toISOString()
        })
        .eq("id", id);

      if (error) {
        saved.style.color = "red";
        saved.textContent = "保存失敗";
        console.error(error);
        alert("保存失敗: " + error.message);
        return;
      }

      saved.style.color = "green";
      saved.textContent = "保存しました";

      setTimeout(() => {
        saved.textContent = "";
      }, 1200);
    }

    async function init() {
      loadTheme();
      await loadFilterOptions();
      await loadCards();
    }

    initAuth();
  </script>
  </div>
</body>
</html>
